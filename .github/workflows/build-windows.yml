name: Build Windows

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Clean previous WebView2 SDK
        run: |
          if (Test-Path lib/webview2) {
            Remove-Item -Recurse -Force lib/webview2 -ErrorAction SilentlyContinue
          }
        shell: pwsh
      
      - name: Download WebView2 SDK
        run: |
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2792.45" -OutFile webview2.zip
          Expand-Archive webview2.zip -DestinationPath lib/webview2 -Force
          Remove-Item webview2.zip -ErrorAction SilentlyContinue
        shell: pwsh
      
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: bank_account_system-windows
          path: build/bin/Release/bank_account_system.exe
